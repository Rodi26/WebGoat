name: "Frogbot Scan Repository"
on:
  workflow_dispatch:
  schedule:
    # The repository will be scanned once a day at 00:00 GMT.
    - cron: "0 0 * * *"
permissions:
  contents: write
  pull-requests: write
  security-events: write
  id-token: write
jobs:
  scan-repository:
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    env:
      JF_URL: ${{ vars.JF_HOST_CLI != '' && format('https://{0}/', vars.JF_HOST_CLI) || secrets.JF_URL }}
      JF_PUBLIC_HOST: ${{ vars.JF_HOST }}
      JF_PUBLIC_URL: ${{ vars.JF_HOST != '' && format('https://{0}/', vars.JF_HOST) || '' }}
      JF_IAP_PROXY_PORT: "18081"
    strategy:
      matrix:
        # The repository scanning will be triggered periodically on the following branches.
        branch: ["main"]
        environment: ["solenglatest", "myjfrog", "artifactory"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      # IAP only for the artifactory GitHub Environment (not solenglatest / myjfrog).
      - name: JFrog IAP setup (WIF + local proxy, API only)
        if: ${{ matrix.environment == 'artifactory' && vars.IAP_USE_WIF == 'true' }}
        uses: ./.github/actions/jfrog-iap-setup
        with:
          iap_enabled: ${{ vars.IAP_USE_WIF }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          iap_oauth_client_id: ${{ vars.IAP_OAUTH_CLIENT_ID }}
          jf_host: ${{ vars.JF_HOST }}
          jf_host_cli: ${{ vars.JF_HOST_CLI }}
          proxy_port: "18081"
          with_docker: "false"
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          gcp_wif_service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
      - uses: jfrog/frogbot@v2
        env:
          # JF_URL: from job env; when IAP proxy runs, GITHUB_ENV sets JF_URL to http://127.0.0.1:<port>/
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JFROG_PROJECT: ${{ vars.JFROG_PROJECT }}
