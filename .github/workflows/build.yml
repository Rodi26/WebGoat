            sleep 60
          done
          exit 1
      - name: Run a source code audit
        run: jf audit --licenses --format=table --fail=false #--watches License_not_validated 
      - name: Scan jar file locally with JFrog Xray
        run: jf scan "./target/${{ env.ArtifactName }}-${{ env.Version }}.jar" --format=table  #--watches  Security_policy_1
      - name: Authenticate Docker for IAP proxy
        env:
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${JF_IAP_PROXY_MODE:-false}" != "true" ]; then
            exit 0
          fi
          U="${{ vars.JF_DOCKER_USERNAME }}"
          if [ -z "${U}" ]; then
            U=$(jf rt curl -sS "/artifactory/api/security/user" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('name') or d.get('email') or '')")
          fi
          if [ -z "${U}" ]; then
            echo "::error::Set Actions variable JF_DOCKER_USERNAME (Artifactory user), or ensure the token can call GET /artifactory/api/security/user."
            exit 1
          fi
          export DOCKER_USERNAME="$U"
          python3 -c 'import base64,json,os; from pathlib import Path; h=os.environ["JF_REGISTRY_HOST"].strip(); u=os.environ["DOCKER_USERNAME"].strip(); t=os.environ["JF_ACCESS_TOKEN"].strip(); b=base64.b64encode((u+":"+t).encode()).decode(); c={"auths":{h:{"auth":b},"http://"+h:{"auth":b}}}; Path.home().joinpath(".docker").mkdir(parents=True, exist_ok=True); Path.home().joinpath(".docker","config.json").write_text(json.dumps(c), encoding="utf-8"); print("Wrote ~/.docker/config.json with Basic auth for", h)'
      - name: Build container image
        env:
          BUILD_NAME: ${{ env.BUILD_NAME }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          set -euo pipefail
          echo "Docker image: ${DOCKER_IMAGE_REF}"
          jf docker build -t "${DOCKER_IMAGE_REF}" --build-arg Artifact=./target/${{ env.ArtifactName }}-${{ env.Version }}.jar --build-name="${{ env.BUILD_NAME }}" --build-number="${{ env.BUILD_NUMBER }}" .  --project "${{ vars.JFROG_PROJECT }}"
      - name: Scan docker image locally with JFrog Xray
        run: jf docker scan "${DOCKER_IMAGE_REF}"
      - name: Push container image and publish to JFrog Artifactory
        env:
          BUILD_NAME: ${{ env.BUILD_NAME }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          set -euo pipefail
          jf docker push "${DOCKER_IMAGE_REF}" --build-name="${{ env.BUILD_NAME }}" --build-number="${{ env.BUILD_NUMBER }}" --project "${{ vars.JFROG_PROJECT }}"
          echo "=== Build info dry-run (diagnostic; remove once Docker module is confirmed) ==="
          jf rt bp --project "${{ vars.JFROG_PROJECT }}" --dry-run 2>&1 || true
          jf rt bce --project "${{ vars.JFROG_PROJECT }}"
          jf rt bag --project "${{ vars.JFROG_PROJECT }}"
          jf rt bp --project "${{ vars.JFROG_PROJECT }}"
